apis:
- aid: karmada:karmada-api
  name: Karmada Multi-Cluster API
  description: >-
    Karmada extends the Kubernetes API with custom resources for multi-cluster
    management including PropagationPolicy for distributing resources across
    clusters, OverridePolicy for cluster-specific customization, and
    ResourceBinding for tracking resource placement. The Karmada API server
    provides a unified interface for managing workloads across clusters.
  humanURL: https://karmada.io/docs/

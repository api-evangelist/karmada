aid: karmada
name: Karmada
description: >-
  Karmada is a CNCF incubating Kubernetes management system that enables
  running applications across multiple Kubernetes clusters and clouds. It
  provides a unified control plane for multi-cluster scheduling, failover,
  and traffic management. Karmada uses Kubernetes-native APIs and supports
  propagation policies, override policies, and federated resource management.
url: https://karmada.io
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Multi-Cluster
- Kubernetes
- Federation
- Scheduling
- Cloud Native
- Incubating
